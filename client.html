<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --brand-main: #748173;
            --text-dark: #1a2b3c;
            --gold: #c5a059;
            --white: #ffffff;
            --progress-fill: #f2ede4;
        }

        body { 
            background: transparent; font-family: sans-serif; margin: 0; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; 
        }

        .poll-card { 
            background: var(--white); 
            width: 100%; max-width: 600px; height: 440px; min-height: 440px;
            padding: 30px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            box-sizing: border-box; display: flex; flex-direction: column; position: relative; overflow: hidden;
        }

        .fade-in { animation: fadeIn 0.6s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .label { color: var(--gold); font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px; flex-shrink: 0; }
        h2 { margin: 0 0 5px 0; color: var(--text-dark); font-size: 22px; font-weight: 400; font-family: 'Times New Roman', serif; flex-shrink: 0; }
        .question { font-size: 16px; color: var(--text-dark); margin-bottom: 15px; flex-shrink: 0; }

        /* Poll Specifics */
        .options-wrapper { flex-grow: 1; overflow-y: auto; padding-right: 5px; margin-bottom: 15px; }
        .options-list { display: flex; flex-direction: column; gap: 10px; }
        .poll-option { 
            position: relative; background: var(--white); border: 1px solid #efefef; 
            border-radius: 12px; padding: 14px; display: flex; align-items: center; 
            justify-content: space-between; cursor: pointer; overflow: hidden; 
        }
        .option-fill { position: absolute; top: 0; left: 0; bottom: 0; background-color: var(--progress-fill); z-index: 0; transition: width 0.6s ease; }
        .option-label { position: relative; z-index: 1; display: flex; align-items: center; gap: 10px; color: var(--text-dark); font-size: 14px; }
        .percentage-text { position: relative; z-index: 1; color: #888; font-size: 13px; }
        .radio-circle { width: 16px; height: 16px; border: 1.5px solid #ccc; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; }
        .poll-option.active { border-color: var(--brand-main); }
        .poll-option.active .radio-circle::after { content: ""; width: 8px; height: 8px; background-color: var(--brand-main); border-radius: 50%; }

        /* Slider Styles */
        .slider-container { position: relative; flex-grow: 1; width: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .slide { display: none; height: 100%; flex-direction: column; }
        .slide.active { display: flex; animation: fadeIn 0.8s ease; }
        .special-image { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; margin-bottom: 15px; flex-shrink: 0; }
        .special-desc { color: #555; font-size: 14px; line-height: 1.5; height: 45px; overflow: hidden; margin-bottom: 10px; }

        /* Dots Navigation */
        .dots-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; flex-shrink: 0; }
        .dot { width: 8px; height: 8px; background: #ddd; border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .dot.active { background: var(--gold); width: 20px; border-radius: 4px; }

        .submit-btn { width: 100%; background: #0d1b2a; color: var(--gold); border: none; padding: 14px; border-radius: 10px; font-weight: 700; font-size: 15px; cursor: pointer; flex-shrink: 0; }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="main-card" class="poll-card">
        
        <div id="poll-view" class="hidden" style="height: 100%; display: flex; flex-direction: column;">
            <div class="label">Member Poll</div>
            <h2 id="poll-title">Your Vote Matters</h2>
            <p class="question" id="poll-question"></p>
            <div class="options-wrapper">
                <div class="options-list" id="options-container"></div>
            </div>
            <button class="submit-btn" id="submit-btn" onclick="submitVote()" disabled>Submit Vote</button>
        </div>

        <div id="special-view" class="hidden" style="height: 100%; flex-direction: column;">
            <div class="slider-container" id="slider-root"></div>
            <div class="dots-container" id="dots-root"></div>
            <button class="submit-btn" onclick="window.parent.postMessage('LEARN_MORE', '*')">Learn More</button>
        </div>

    </div>

    <script>
        let currentSlide = 0;
        let slideInterval;
        let currentPollId = null;
        let selectedOptionName = null;
        let canVote = true;

        window.onmessage = (event) => {
            const pV = document.getElementById('poll-view');
            const sV = document.getElementById('special-view');

            if (event.data.type === 'LOAD_POLL') {
                sV.style.display = 'none';
                pV.style.display = 'flex';
                pV.classList.remove('hidden');
                currentPollId = event.data.payload.pollId;
                renderPoll(event.data.payload);
            } 
            else if (event.data.type === 'LOAD_SPECIAL') {
                pV.style.display = 'none';
                sV.style.display = 'flex';
                sV.classList.remove('hidden');
                initSlider(event.data.payload);
            }
        };

        function initSlider(slides) {
            const sliderRoot = document.getElementById('slider-root');
            const dotsRoot = document.getElementById('dots-root');
            sliderRoot.innerHTML = '';
            dotsRoot.innerHTML = '';

            slides.forEach((slide, idx) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = `slide ${idx === 0 ? 'active' : ''}`;
                slideDiv.innerHTML = `
                    <div class="label">${slide.label}</div>
                    <h2>${slide.title}</h2>
                    <img class="special-image" src="${slide.image}" alt="Special">
                    <p class="special-desc">${slide.description}</p>
                `;
                sliderRoot.appendChild(slideDiv);

                const dot = document.createElement('div');
                dot.className = `dot ${idx === 0 ? 'active' : ''}`;
                dot.onclick = () => showSlide(idx);
                dotsRoot.appendChild(dot);
            });

            currentSlide = 0;
            if (slideInterval) clearInterval(slideInterval);
            if (slides.length > 1) {
                slideInterval = setInterval(() => {
                    showSlide((currentSlide + 1) % slides.length);
                }, 5000);
            }
        }

        function showSlide(n) {
            const slides = document.querySelectorAll('.slide');
            const dots = document.querySelectorAll('.dot');
            if (slides.length === 0) return;
            slides[currentSlide].classList.remove('active');
            dots[currentSlide].classList.remove('active');
            currentSlide = n;
            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.add('active');
        }

        function renderPoll(data) {
            document.getElementById('poll-question').innerText = data.name;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            canVote = !data.alreadyVoted;

            data.options.forEach(opt => {
                const count = data.results[opt] || 0;
                const percent = data.totalVotes > 0 ? Math.round((count / data.totalVotes) * 100) : 0;
                const isActive = data.selectedId === opt;
                const div = document.createElement('div');
                div.className = `poll-option ${isActive ? 'active' : ''}`;
                div.onclick = () => { if(canVote) selectOption(div, opt); };
                div.innerHTML = `<div class="option-fill" style="width:${percent}%"></div><div class="option-label"><div class="radio-circle"></div>${opt}</div><div class="percentage-text">${percent}%</div>`;
                container.appendChild(div);
            });

            const btn = document.getElementById('submit-btn');
            if (!canVote) { btn.innerText = "Vote Recorded"; btn.disabled = true; }
        }

        function selectOption(el, name) {
            document.querySelectorAll('.poll-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
            selectedOptionName = name;
            document.getElementById('submit-btn').disabled = false;
        }

        function submitVote() {
            if (selectedOptionName) {
                window.parent.postMessage({ 
                    type: 'SUBMIT_VOTE', 
                    optionName: selectedOptionName, 
                    pollId: currentPollId 
                }, "*");
                document.getElementById('submit-btn').innerText = "Sending...";
                document.getElementById('submit-btn').disabled = true;
            }
        }
    </script>
</body>
</html>
